name: test

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint
        run: |
          uv run ruff check
          uv run ruff format --check

      - name: Type-check
        run: uv run mypy src/tunas

      - name: Test (with coverage gate)
        # The suite is fully self-contained: real-world data is covered by the
        # committed golden files under tests/data/, so no network is needed.
        # `fail_under = 95` (pyproject [tool.coverage.report]) gates the result.
        run: uv run pytest --cov=tunas
