site_name: tunas
site_description: USA Swimming meet result (.cl2 / SDIF v3 and Hy-Tek .hy3) parser and analysis library
site_url: https://ajoe2.github.io/tunas/
repo_url: https://github.com/ajoe2/tunas
repo_name: ajoe2/tunas
edit_uri: edit/main/docs/
copyright: Copyright &copy; Andy Joe

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.png
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tooltips
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Guide:
      - Overview: guide/index.md
      - Getting started: guide/getting_started.md
      - Parsing & errors: guide/parsing.md
      - Data model: guide/models.md
      - Recipes: guide/cookbook.md
  - API reference:
      - Overview: reference/index.md
      - Parsing & diagnostics: reference/parsing.md
      - Exceptions: reference/exceptions.md
      - Domain model: reference/models.md
      - Events & time: reference/event_time.md
      - Enumerations: reference/enums.md
      - Geography: reference/geography.md
      - Time standards: reference/standards.md
  - File Format:
      - Overview: formats/index.md
      - SDIF (.cl2): formats/cl2_format.md
      - Hy-Tek (.hy3): formats/hy3_format.md
  - About:
      - Overview: about/index.md
      - Design: about/architecture.md
      - Changelog: about/changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            heading_level: 3
            members_order: source
            filters: ["!^_"]
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - toc:
      permalink: true
